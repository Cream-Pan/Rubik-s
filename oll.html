<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>ルービックキューブ紹介</title>
        <link href="main1.css" rel="stylesheet" type="text/css" media="(min-width: 960px)" >
        <link href="main2.css" rel="stylesheet" type="text/css" media="(min-width: 600px) and (max-width: 959px)" >
        <link href="main3.css" rel="stylesheet" type="text/css" media="(max-width: 599px)" >

        <style>
            @media print {
                body * {
                    visibility: hidden;
                }
                #printArea * {
                    visibility: visible;
                }
                #printArea {
                    position: absolute;
                    top: 0;
                    left: 0;
                }
            }
        </style>

    </head>
    <header>
        <h1>【頭がよくなる⁉】ルービックキューブの魅力</h1>
    </header>
 <body>
    <h2>メニュー</h2>
    <div id="menu-placeholder"></div>
    <script src="app.js"></script>
    <br>
    <h2>OLL一覧</h2>

    <div id="dat"></div>
    <input type="text" id="dat2" placeholder="今日でどこまで進んだ？">
    <input type="button" value="成果を登録" onclick="saveCookie()">
    <p>※継続は力なり<br><strong>３０日</strong>でリセットされるので注意！</p>
    
    <br>

    <div id="printArea">
        <img class="oll" src="./images/oll1.png" >
        <img class="oll" src="./images/oll2.png" >
        <img class="oll" src="./images/oll3.png" >
    </div>
    <p><a href="#" onclick="printPage()">印刷する</a></p>
    
    <hr />
    <script type="text/javascript"> 
        window.onload = function() { 
            var str = ""; 
            str += "達成度：" + getCookie() + "<br>";
    
            document.getElementById("dat").innerHTML = str; 
        }
    
        function getCookie() { 
            var cookieStr = document.cookie + ";";
            var startNum = cookieStr.indexOf("cookie_data");
            var txt = "";
            if (startNum != -1){
                var endNum = cookieStr.indexOf(";",startNum);
                txt = unescape(cookieStr.substring(startNum + "cookie_data".length + 1, endNum));
            }
            return txt;
        }
    
        function saveCookie() {
            var txt = document.getElementById("dat2").value;
            var day = new Date(); 
            day.setTime(day.getTime() + 30*24*60*60*5*1000);
            
            document.cookie = "cookie_data=" + escape(txt) + ";expires=" + day.toGMTString();
            
            location.reload();
        }

        function printPage() {
            window.print();
        }
    </script>

</body>

</html>
